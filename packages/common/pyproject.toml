[project]
name = "ngdep-common"
version = "0.1.0"
description = "Shared common library for NextGen Data Engineering Platform"
requires-python = ">=3.13,<3.14"
dependencies = [
    "pydantic>=2.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["common"]